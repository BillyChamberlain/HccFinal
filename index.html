<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scrollable Timeline</title>
    <meta
      name="description"
      content="A smooth scrollable timeline with editable event pages."
    />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body class="home-page">
    <canvas id="skyCanvas" aria-hidden="true"></canvas>

    <header class="site-header" aria-label="Site header">
      <a class="brand" href="index.html" aria-label="Timeline home">
        <span class="brand-mark"></span>
        <span>Timeline</span>
      </a>
      <nav class="top-nav" aria-label="Timeline navigation">
        <a href="#timelineframe">Events</a>
      </nav>
    </header>

    <main>
      <section class="hero-section" aria-labelledby="page-title">
        <div class="hero-copy">
          <p class="eyebrow">Our final</p>
          <h1 id="page-title" style = "max-width: 20000px">Hist<a style = "text-decoration: none; cursor: text" href = "./assets/images/shores.png" >o</a>ry of the Catholic Church</h1>
          <p>
            By <strong style = "font-size: px">William Chamberlain</strong>, Saavan Goel, and Ayaan Khan
          </p>
          <div class="hero-actions">
            <a class="primary-link" href="#timelineframe">Events</a>
          </div>
        </div>
      </section>

      <section id="timeline" class="timeline-scroll" aria-label="Scrollable event timeline style" style = "position: relative; bottom: 150px">
        <div class="timeline-sticky">
          <div class="timeline-shell">
            <div class="timeline-meta">
              <p class="section-kicker">Scroll timeline</p>
              <h2 id="activeTitle">Loading events</h2>
              <p id="activeSummary"></p>
            </div>
            <div class="timeline-frame">
              <div class="progress-wrap" aria-hidden="true">
                <div id = "timelineframe" class="progress-line"></div>
                <div id="progressFill" class="progress-fill"></div>
              </div>
              <div id="timelineTrack" class="timeline-track"></div>
            </div>
          </div>
        </div>
      </section>

    </main>

    <script src="assets/timeline-data.js"></script>
    <script src="assets/main.js"></script>
  </body>
</html>
