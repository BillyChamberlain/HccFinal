<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The hard pivot</title>
    <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../assets/styles.css" />
  <style>
    /* Holds the image, canvas, and text elements in one unified coordinate space */
    .diagram-container {
      position: relative;
      display: inline-block;
    }

    .base-image {
      display: block;
      max-width: 100%;
      height: auto;
    }
    .img_div{
      width: 350px;
      height: 235px;
      display: flex;
      background-color: black;
      justify-content: center;
      align-items: center;
      transition: transform 0.2s ease-in-out;
    }
    .img_div:hover{
      transform: scale(1.1);
      cursor:pointer;
    }

    /* Invisible canvas layer perfectly overlaying the image */
    .arrow-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none; /* Allows user to still click elements underneath */
    }

    /* Clean text styling */
    .label-text {
      position: absolute;
      font-family: Arial, sans-serif;
      font-weight: bold;
      color: #ffffff;
      background-color: #222222;
      padding: 6px 12px;
      border-radius: 4px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
      z-index: 10;
    }

    .hover-container {
            position: relative;
            display: inline-block; /* Keeps it in line with your normal text */
            cursor: pointer;
            font-family: Arial, sans-serif;
        }

        .trigger-text {
            color: #0066cc;
            font-weight: bold;
            text-decoration: underline;
        }

        /* CHANGED: This is now a div, safely containing p and img tags */
        .hidden-box {
            display: none; 
            position: absolute;
            top: 125%; 
            left: 0;
            width: 270px;
            padding: 12px;
            background-color: #333333;
            color: #ffffff;
            border-radius: 5px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }

        /* Set a safe size for any images you add inside the box */
        .hidden-box img {
            width: 100%;
            height: auto;
            border-radius: 3px;
            margin-top: 8px;
        }

        /* Keeps paragraph margins tidy inside the tight box */
        .hidden-box p {
            margin: 5px 0;
            font-size: 14px;
            line-color: #ffffff;
        }

        /* The hover trigger rule */
        .hover-container:hover .hidden-box {
            display: block;
        }
  </style>
  </head>
  <body class="detail-page" style="--event-accent: #ffd166">
    <header class="site-header">
      <a class="brand" href="../index.html"><span class="brand-mark"></span><span>Timeline</span></a>
      <a class="back-link" href="../index.html#timeline">Back to timeline</a>
    </header>
    <main class="detail-main">
      <section class="detail-hero">
        <div>
          <p class="detail-kicker">Summary</p>
          <h1>What is the Church?</h1>
          <p>
            <div class="diagram-container" id="diagram">
            <img src="../assets/images/birth.png" alt="Target Diagram" class="base-image" id="bg-image" style = "padding: 30px; width: 800px; height: 400px">
            <canvas class="arrow-canvas" id="canvas"></canvas>

            <!-- 
              To customize:
              1. Set data-start-x and data-start-y to position the text label block.
              2. Set data-target-x and data-target-y to set exactly where the arrowhead points on the image.
            -->
            <div class="label-text" data-start-x="0" data-start-y="0" data-target-x="370" data-target-y="170">
              <div class = "hover-container">
              <span class = "trigger text">Cow</span>
              <div class = "hidden-box">
                <p1 class = "box-text">It is in fact a cow</p1>
                <img src = "../assets/images/creation.jpeg" alt = "Creation" class = 'box-img'/>
              </div>
            </div>
            </div>

            <div class="label-text" data-start-x="550" data-start-y="400" data-target-x="250" data-target-y="225">
              Jesus
            </div>
          </div>

          <script>
            const container = document.getElementById('diagram');
            const img = document.getElementById('bg-image');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const labels = document.querySelectorAll('.label-text');

            function drawDiagram() {
              // Step 1: Size the canvas to match the displayed image exactly
              const rect = container.getBoundingClientRect();
              canvas.width = rect.width;
              canvas.height = rect.height;

              // Clear previous drawings
              ctx.clearRect(0, 0, canvas.width, canvas.height);

              labels.forEach(label => {
                // Read your custom coordinates
                const startX = parseFloat(label.getAttribute('data-start-x'));
                const startY = parseFloat(label.getAttribute('data-start-y'));
                const targetX = parseFloat(label.getAttribute('data-target-x'));
                const targetY = parseFloat(label.getAttribute('data-target-y'));

                // Step 2: Position the text HTML element
                label.style.left = startX + 'px';
                label.style.top = startY + 'px';

                // Step 3: Calculate canvas attachment point (center-right of the text block)
                const labelWidth = label.offsetWidth;
                const labelHeight = label.offsetHeight;
                
                // Defaulting line attachment to the center of the text box
                const lineStartX = startX + (labelWidth / 2);
                const lineStartY = startY + (labelHeight / 2);

                // Step 4: Draw the connecting line
                ctx.beginPath();
                ctx.moveTo(lineStartX, lineStartY);
                ctx.lineTo(targetX, targetY);
                ctx.strokeStyle = '#ff3333'; // Arrow line color
                ctx.lineWidth = 3;           // Arrow line thickness
                ctx.lineCap = 'round';
                ctx.stroke();

                // Step 5: Draw the arrowhead at the target coordinates
                const angle = Math.atan2(targetY - lineStartY, targetX - lineStartX);
                const arrowLength = 15; // Size of arrowhead

                ctx.beginPath();
                ctx.moveTo(targetX, targetY);
                ctx.lineTo(targetX - arrowLength * Math.cos(angle - Math.PI / 6), targetY - arrowLength * Math.sin(angle - Math.PI / 6));
                ctx.moveTo(targetX, targetY);
                ctx.lineTo(targetX - arrowLength * Math.cos(angle + Math.PI / 6), targetY - arrowLength * Math.sin(angle + Math.PI / 6));
                ctx.strokeStyle = '#ff3333';
                ctx.lineWidth = 4;
                ctx.stroke();
              });
            }

            // Run drawing logic once image is loaded, and update if screen resizes
            if (img.complete) {
              drawDiagram();
            } else {
              img.addEventListener('load', drawDiagram);
            }
            window.addEventListener('resize', drawDiagram);
          </script>
          </p>
        </div>
        <div class="detail-art visual-pivot" aria-hidden="true"></div>
      </section>
      <section class="detail-grid">
        <aside class="detail-facts">
          <div class="fact"><strong>Date</strong><span>Late 2020</span></div>
          <div class="fact"><strong>Location</strong><span>Edit this detail</span></div>
          <div class="fact"><strong>Theme</strong><span>Change and focus</span></div>
        </aside>
        <article class="detail-section">
          <h2>What changed</h2>
          <a href = "../events/02-images_info/paschal_mystery.html">
            <div class = "img_div">
                <img src = "../assets/images/paschal.png" alt = "Paschal Mystery" style = "width: 96%; max-height: 96%; height: auto">
            </div>
            </a>
          <p>
          </p>
          <ul>
            <li>Add bullets for milestones.</li>
            <li>Drop in images with standard <code>&lt;img&gt;</code> tags.</li>
            <li>Link to other pages or external references.</li>
          </ul>
        </article>
      </section>
    </main>
  </body>
</html>
