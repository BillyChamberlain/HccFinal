<!doctype html>

    <title>The public launch</title>
    <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../assets/styles.css" />
    <style>
    .outer {
    display: flex;
    width: 800px;
    max-height: 1400px;
    height: auto; 
    position: relative;
    top: 10%;
    left: 40%;
    /* Enables horizontal scrolling */
    overflow-x: auto; 
    
    /* Smooth scrolling behavior */
    scroll-behavior: smooth; 
    
    /* Tells the container to snap on the X axis strictly */
    scroll-snap-type: x mandatory; 
    
    /* Hides scrollbar for a cleaner look (optional) */
    -ms-overflow-style: none;  /* IE and Edge */
    scrollbar-width: none;  /* Firefox */
    transition: transform 0.3s ease-in-out;
  }

  /* Hides scrollbar for Chrome, Safari, and Opera */
  .outer::-webkit-scrollbar {
    display: none;
  }

  .outer a {
    /* Forces each link/image to take up exactly 100% of the container width */
    flex: 0 0 100%; 
    width: 100%;
    height: 100%;
    
    /* Tells the container exactly where to snap this element */
    scroll-snap-align: start; 
  }

  .outer img {
    width: 100%;
    height: 100%;
    /* Ensures the image fills the area beautifully without distorting */
    object-fit: cover; 
    border-radius: 10px;
  }
    .outer:hover{
      transform: scale(1.1);
      cursor:pointer;
    }
    </style>
  </head>
