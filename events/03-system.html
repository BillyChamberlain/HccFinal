    <style>
    /* Holds the image, canvas, and text elements in one unified coordinate space */
    .diagram-container {
      position: relative;
      display: inline-block;
    }
    .hero-content {
    display: flex;
    align-items: flex-start;
    gap: 0px;
    position: relative;
    right: 50px;           
    }

    .detail-facts {
    flex: 0 0 300px;
}

    .diagram-container {
        flex-shrink: 0;
    }

    .base-image {
      display: block;
      max-width: 100%;
      height: auto;
    }
    .img_div{
      display: flex;
      background: linear-gradient(135deg, #27272753, #0a0a0a66);
      justify-content: center;
      align-items: center;
      transition: transform 0.3s ease-in-out;
      width: 250px;
      height: 300px;
      border-radius: 15px;
      flex-wrap: wrap;
      transform-style: preserve-3d; 
    }
    .img_div:hover{
      transform: scale(1.1);
      cursor:pointer;
    }
    .img_div img{
      opacity: 1;
      position: relative;
      width: 95%;
      max-height: 45%;
      height: auto;
      bottom: 23%;
      border-radius: 15px;
    }
    .img_div p{
      font-size: 18px;
      position: absolute;
      top: 60%;
      text-align: center;
      color: #bbbbbb;
      width: 100%;
      z-index: 1000;
      transform: translateZ(1px); 
    }
    .img_row{
      display: flex;
      gap: 10px;
      position: relative;
      right: 15px;
    }
    .img_row a{
      display: block;
    }

    /* Invisible canvas layer perfectly overlaying the image */
    .arrow-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none; /* Allows user to still click elements underneath */
    }

    /* Clean text styling */
    .label-text {
      position: absolute;
      font-family: Arial, sans-serif;
      font-weight: bold;
      color: #ffffff;
      background-color: #222222;
      padding: 6px 12px;
      border-radius: 4px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
      z-index: 10;
    }

    .hover-container {
            position: relative;
            display: inline-block; /* Keeps it in line with your normal text */
            cursor: pointer;
            font-family: Arial, sans-serif;
        }

        .trigger-text {
            color: #0066cc;
            font-weight: bold;
            text-decoration: underline;
        }

        /* CHANGED: This is now a div, safely containing p and img tags */
        .hidden-box {
            display: none; 
            position: absolute;
            top: 125%; 
            right: 0px;
            width: 270px;
            padding: 12px;
            background-color: #333333;
            color: #ffffff;
            border-radius: 5px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }

        /* Set a safe size for any images you add inside the box */
        .hidden-box img {
            width: 100%;
            height: auto;
            border-radius: 3px;
            margin-top: 8px;
        }

        /* Keeps paragraph margins tidy inside the tight box */
        .hidden-box p {
            margin: 5px 0;
            font-size: 14px;
            line-color: #ffffff;
        }

        /* The hover trigger rule */
        .hover-container:hover .hidden-box {
            display: block;
        }
        .tree-head{
          display: block;
          width: 400px;
          max-height: 1000px;
          height: auto;
          text-align: center;
          background: linear-gradient(to right, #00064753, #14002866);
        }
        .fuck{
          display: flex;
          justify-content: center;
        }

  </style>
  </head>
  <body class="detail-page" style="--event-accent: #06d6a0">
    <header class="site-header">

    <main class="detail-main">
      <section>
        <div>
          <p class="detail-kicker">Rome</p>

          <div class = "fuck">
          <div class = "tree-head">
              <p style = "font-size: 15px; padding-top: 6px"><strong>The roman occupation</strong></p>
              <img src = "../assets/images/RomeCol.png" style = "position: relative; width: 90%; max-height: 90%; height: auto; padding-bottom: 10px;">
          </div>
          </div>
          <div class="diagram-container" id="diagram" style = "width: 1400px; height: 700px; position: relative; right: 4.5%">
          <canvas class="arrow-canvas" id="canvas"></canvas>
          <div class="arrow_draw" data-start-x="0" data-start-y="0" data-target-x="100" data-target-y="200"></div>
          <div class="arrow_draw" data-start-x="0" data-start-y="0" data-target-x="450" data-target-y="200"></div>
          <div class="arrow_draw" data-start-x="0" data-start-y="0" data-target-x="700" data-target-y="200"></div>
          <div class="arrow_draw" data-start-x="0" data-start-y="0" data-target-x="950" data-target-y="200"></div>
          <div class="arrow_draw" data-start-x="0" data-start-y="0" data-target-x="1250" data-target-y="200"></div>
            <div style="display: flex; position: absolute; top: 30%; left: 31px; z-index: 5; gap: 20px">
              <a href = "../events/03-sections_info/Early_people.html">
                <div class = "img_div">
                    <img src = "../assets/images/martyrs.png">
                    <p>The people of the early Roman occupied church</p>
                </div>
              </a>
              <a href = "../events/03-sections_info/Persecution.html">
                <div class = "img_div">
                  <img src = "../assets/images/persecution.png">
                  <p>Church persecution</p>
                </div>

              <a href = "../events/03-sections_info/constantine.html">
                <div class = "img_div">
                  <img src = "../assets/images/Constantine.png">

                </div>
              </a>

                <div class = "img_div">

                  <p>Early church councils</p>

                  <p>Early church heresies</p>
                </div>

            </div>
            </div>
            </div>
            <script>
              const container = document.getElementById('diagram');
              const canvas = document.getElementById('canvas');
              const ctx = canvas.getContext('2d');
              const labels = document.querySelectorAll('.arrow_draw');

              function drawDiagram() {
                const rect = container.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                labels.forEach(label => {
                  const startX = parseFloat(label.dataset.startX);
                  const startY = parseFloat(label.dataset.startY);
                  const targetX = parseFloat(label.dataset.targetX);
                  const targetY = parseFloat(label.dataset.targetY);

                  label.style.left = `${startX}px`;
                  label.style.top = `${startY}px`;

                  const labelWidth = label.offsetWidth;
                  const labelHeight = label.offsetHeight;

                  const lineStartX = startX + labelWidth / 2;
                  const lineStartY = startY + labelHeight / 2;

                  ctx.beginPath();
                  ctx.moveTo(lineStartX, lineStartY);
                  ctx.lineTo(targetX, targetY);
                  ctx.strokeStyle = '#61007D';
                  ctx.lineWidth = 3;
                  ctx.lineCap = 'round';
                  ctx.stroke();

                  const angle = Math.atan2(targetY - lineStartY, targetX - lineStartX);
                  const arrowLength = 15;

                  ctx.beginPath();
                  ctx.moveTo(targetX, targetY);
                  ctx.lineTo(
                    targetX - arrowLength * Math.cos(angle - Math.PI / 6),
                    targetY - arrowLength * Math.sin(angle - Math.PI / 6)
                  );
                  ctx.moveTo(targetX, targetY);
                  ctx.lineTo(
                    targetX - arrowLength * Math.cos(angle + Math.PI / 6),
                    targetY - arrowLength * Math.sin(angle + Math.PI / 6)
                  );
                  ctx.strokeStyle = '#61007D';
                  ctx.lineWidth = 4;
                  ctx.stroke();
                });
              }

              window.addEventListener('DOMContentLoaded', drawDiagram);
              window.addEventListener('resize', drawDiagram);
            </script>
      </section>
